<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>생일 문구</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="생일 문구">
<style>
:root{--cream:#faf6f0;--warm:#f0e8d8;--gold:#b8922a;--brown:#6b4c2a;--text:#2d1f0e;--muted:#8a7260;--border:#e2d4c0;--white:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:15px}
header{background:var(--brown);color:var(--cream);padding:16px 20px}
header .logo{font-size:1rem;font-weight:700}
header .sub{font-size:0.75rem;color:#d4c4b0;margin-top:2px}
.container{max-width:960px;margin:0 auto;padding:16px}
.today-banner{background:linear-gradient(135deg,var(--brown),#a07840);color:var(--cream);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.today-banner h2{font-size:0.85rem;margin-bottom:8px;opacity:0.85}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.today-chip{background:rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px;font-size:0.82rem;cursor:pointer;border:1px solid rgba(255,255,255,0.25)}
.no-bday{font-size:0.82rem;opacity:0.7}
.box{background:var(--white);border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.box label{font-size:0.78rem;color:var(--muted);display:block;margin-bottom:6px}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:0.9rem;font-family:inherit;background:var(--cream);outline:none}
.search-row input:focus{border-color:var(--gold)}
.btn-s{background:var(--gold);color:var(--white);border:none;border-radius:8px;padding:9px 16px;font-size:0.88rem;cursor:pointer}
.results{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.rchip{background:var(--warm);border:1px solid var(--border);border-radius:16px;padding:5px 12px;font-size:0.82rem;cursor:pointer}
.rchip.sel{background:var(--gold);color:var(--white);border-color:var(--gold)}
.divider{height:1px;background:var(--border);margin:12px 0}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.month-nav button{background:var(--warm);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:0.95rem}
.month-nav span{font-size:0.9rem;color:var(--brown);font-weight:600}
.mchip{background:var(--warm);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-size:0.8rem;cursor:pointer;display:inline-block;margin:2px}
.gen-area{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.gen-area{grid-template-columns:1fr}}
.card{background:var(--white);border-radius:10px;border:1px solid var(--border)}
.card-head{background:var(--warm);padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:0.9rem;color:var(--brown)}
.card-body{padding:16px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ig label{font-size:0.72rem;color:var(--muted);display:block}
.ig span{font-size:0.88rem;font-weight:500}
.opt-g{margin-bottom:12px}
.opt-g label{font-size:0.78rem;color:var(--muted);display:block;margin-bottom:5px}
.opt-row{display:flex;flex-wrap:wrap;gap:5px}
.ob{background:var(--warm);border:1.5px solid var(--border);border-radius:6px;padding:5px 11px;font-size:0.8rem;cursor:pointer;font-family:inherit;color:var(--text)}
.ob.active{background:var(--gold);color:var(--white);border-color:var(--gold)}
.ci{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:0.86rem;font-family:inherit;background:var(--cream);outline:none;margin-top:3px}
.ci:focus{border-color:var(--gold)}
.btn-gen{width:100%;background:var(--brown);color:var(--cream);border:none;border-radius:8px;padding:11px;font-size:0.92rem;font-weight:700;cursor:pointer;margin-top:6px}
.btn-gen:disabled{background:var(--border);cursor:not-allowed;color:var(--muted)}
.result-card{grid-column:1/-1}
.msg-out{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:0.88rem;line-height:1.9;white-space:pre-wrap;min-height:60px}
.ph{color:var(--muted);text-align:center;padding:24px 0;font-size:0.85rem}
.btn-copy{background:var(--warm);border:1.5px solid var(--border);border-radius:8px;padding:8px 16px;font-size:0.84rem;font-family:inherit;cursor:pointer;color:var(--text);margin-top:8px}
.btn-copy.done{background:#4caf50;color:var(--white);border-color:#4caf50}
.child-tag{display:inline-block;background:var(--warm);border-radius:4px;padding:2px 6px;font-size:0.78rem;color:var(--brown);margin-top:6px}
</style>
</head>
<body>
<header>
  <div class="logo">🎂 생일 문구 생성기</div>
  <div class="sub">종교교회 청장년부 · 곽성현 목사</div>
</header>
<div class="container">
  <div class="today-banner">
    <h2>🎉 오늘 생일인 교인</h2>
    <div class="chips" id="todayList"><span class="no-bday">불러오는 중...</span></div>
  </div>
  <div class="box">
    <label>이름으로 검색</label>
    <div class="search-row">
      <input type="text" id="si" placeholder="이름 입력" autocomplete="off">
      <button class="btn-s" onclick="doSearch()">검색</button>
    </div>
    <div class="results" id="sr"></div>
    <div class="divider"></div>
    <div class="month-nav">
      <button onclick="chMonth(-1)">‹</button>
      <span id="ml"></span>
      <button onclick="chMonth(1)">›</button>
      <span style="font-size:0.75rem;color:var(--muted);margin-left:2px">이달 생일자</span>
    </div>
    <div id="mlist"></div>
  </div>
  <div class="gen-area">
    <div class="card">
      <div class="card-head">교인 정보</div>
      <div class="card-body">
        <div id="pinfo" style="color:var(--muted);font-size:0.85rem;text-align:center;padding:16px 0">교인을 선택하세요</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">문구 옵션</div>
      <div class="card-body">
        <div class="opt-g">
          <label>전송 시점</label>
          <div class="opt-row">
            <button class="ob active" data-g="t" data-v="당일">당일</button>
            <button class="ob" data-g="t" data-v="늦은 시간">늦은 시간</button>
            <button class="ob" data-g="t" data-v="지난 후">생일 지난 후</button>
          </div>
        </div>
        <div class="opt-g">
          <label>친밀도</label>
          <div class="opt-row">
            <button class="ob active" data-g="f" data-v="y">친밀 (아는 분)</button>
            <button class="ob" data-g="f" data-v="n">처음 인사</button>
          </div>
        </div>
        <div class="opt-g">
          <label>자녀 이름 <span style="font-size:0.72rem;color:var(--muted)">(쉼표 구분)</span></label>
          <input class="ci" type="text" id="ci" placeholder="예: 지호, 은채">
        </div>
        <button class="btn-gen" id="gb" onclick="genMsg()" disabled>문구 생성하기</button>
      </div>
    </div>
    <div class="card result-card">
      <div class="card-head">생성된 문구</div>
      <div class="card-body">
        <div class="msg-out" id="mo"><div class="ph">교인을 선택하고 문구 생성하기를 눌러주세요</div></div>
        <button class="btn-copy" id="cb" onclick="copyMsg()" style="display:none">📋 복사하기</button>
      </div>
    </div>
  </div>
</div>

var SN=['남궁','독고','사공','황보','제갈','김','이','박','최','정','강','조','윤','장','임','한','오','서','신','권','황','안','송','류','전','홍','고','문','양','손','배','백','허','유','남','심','노','하','곽','성','차','주','우','구','민','나','진','엄','채','원','천','방','공','현','함','변','염','여','추','도','소','석','선','설','마','길','연','위','표','명','기','반','왕','모'];
function fn(n){for(var i=0;i<SN.length;i++){if(n.indexOf(SN[i])===0&&n.length>SN[i].length)return n.slice(SN[i].length);}return n;}
function ap(n){var c=n.charCodeAt(n.length-1)-0xAC00;if(c<0||c>11171)return n;return(c%28)!==0?n+'이':n;}
function fc(n){return ap(fn(n));}
function getTitle(p){var r=p[3];if(r==='장로')return'장로님';if(r==='권사')return'권사님';if(r==='집사')return'집사님';return'성도님';}
function getBd(p){var pts=p[1].split('.');return{m:parseInt(pts[1]),d:parseInt(pts[2])};}
function isToday(p){var t=new Date(),b=getBd(p);return b.m===t.getMonth()+1&&b.d===t.getDate();}
function isMonth(p,m){return getBd(p).m===m;}
function getChildren(p){
  var f=p[5]||'',name=p[0],sp=p[6]||'';
  if(!f)return[];
  return f.split(',').map(function(s){return s.trim();}).filter(function(m){
    return m&&m!==name&&m!==sp&&!/[0-9]/.test(m)&&m.length<=4&&/^[가-힣]+$/.test(m);
  });
}
var cm=new Date().getMonth()+1;
var sel=null;
function renderToday(){
  var el=document.getElementById('todayList');
  var arr=D.filter(isToday);
  if(!arr.length){el.innerHTML='<span class="no-bday">오늘 생일인 교인이 없습니다</span>';return;}
  el.innerHTML=arr.map(function(p){return'<span class="today-chip" style="background:rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px;font-size:0.82rem;cursor:pointer;border:1px solid rgba(255,255,255,0.25)" onclick="pick('+D.indexOf(p)+')">'+p[0]+' <span style="font-size:0.72rem;opacity:0.75">'+(p[3]||'성도')+'</span></span>';}).join('');
}
function renderMonth(){
  document.getElementById('ml').textContent=cm+'월';
  var arr=D.filter(function(p){return isMonth(p,cm);}).sort(function(a,b){return getBd(a).d-getBd(b).d;});
  document.getElementById('mlist').innerHTML=arr.length===0
    ?'<span style="font-size:0.8rem;color:var(--muted)">해당 없음</span>'
    :arr.map(function(p){var b=getBd(p);return'<span class="mchip" onclick="pick('+D.indexOf(p)+')">'+p[0]+' <span style="opacity:0.6;font-size:0.75rem">'+b.m+'/'+b.d+'</span></span>';}).join('');
}
function chMonth(d){cm=((cm-1+d+12)%12)+1;renderMonth();}
function doSearch(){
  var q=document.getElementById('si').value.trim();
  var el=document.getElementById('sr');
  if(!q){el.innerHTML='';return;}
  var found=D.filter(function(p){return p[0].indexOf(q)>=0;});
  el.innerHTML=found.length===0
    ?'<span style="font-size:0.8rem;color:var(--muted)">검색 결과 없음</span>'
    :found.map(function(p){var b=getBd(p);return'<span class="rchip" onclick="pick('+D.indexOf(p)+')">'+p[0]+' <span style="opacity:0.6;font-size:0.75rem">'+(p[3]||'성도')+' '+b.m+'/'+b.d+'</span></span>';}).join('');
}
document.getElementById('si').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
function pick(i){
  sel=D[i];
  var ch=getChildren(sel);
  var html='<div class="ig">'
    +'<div><label>이름</label><span>'+sel[0]+'</span></div>'
    +'<div><label>직분</label><span>'+(sel[3]||'성도')+'</span></div>'
    +'<div><label>생년월일</label><span>'+sel[1]+'</span></div>'
    +'<div><label>성별</label><span>'+sel[4]+'</span></div>'
    +'</div>';
  if(ch.length)html+='<div class="child-tag">추정 자녀: '+ch.map(fc).join(', ')+'</div>';
  document.getElementById('pinfo').innerHTML=html;
  document.getElementById('ci').value=ch.length?ch.map(fc).join(', '):'';
  document.getElementById('gb').disabled=false;
  document.getElementById('mo').innerHTML='<div class="ph">문구 생성하기를 눌러주세요</div>';
  document.getElementById('cb').style.display='none';
}

function genMsg(){
  if(!sel)return;

  } else {
    if(timing==='지난 후')op=title+', 늦었지만 생일 진심으로 축하 인사를 드립니다 :)';
    else if(timing==='늦은 시간')op=title+', 늦은 시간이지만 오늘 생일을 맞으셔서 축하 인사를 드립니다 :)';
    else op=title+', 오늘 생일을 맞으셔서 축하 인사를 드립니다 :)';
  }
  var p2='지나온 시간들을 신실하게 지켜주신 하나님의 손길이, 올 한 해 '+title+'의 매일의 삶 위에도 변함없이 함께하시기를 축복합니다.';

  document.getElementById('mo').textContent=msg;
  window._msg=msg;
  document.getElementById('cb').style.display='inline-block';
  document.getElementById('cb').textContent='📋 복사하기';
  document.getElementById('cb').classList.remove('done');
}
function copyMsg(){
  if(!window._msg)return;
  navigator.clipboard.writeText(window._msg).then(function(){
    var b=document.getElementById('cb');
    b.textContent='✅ 복사됨!';b.classList.add('done');
    setTimeout(function(){b.textContent='📋 복사하기';b.classList.remove('done');},2000);
  });
}
